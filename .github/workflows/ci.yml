name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile
        run: python -m compileall -q getproxy tests

      - name: Test
        run: python -m unittest discover -s tests -v

      - name: Smoke (offline paths)
        run: |
          python -m getproxy --version
          python -m getproxy --sources
